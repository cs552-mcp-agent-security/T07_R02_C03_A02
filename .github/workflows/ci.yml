name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nbformat flake8
      - name: Lint
        run: flake8 *.py --max-line-length=120 || true
      - name: Notebook smoke (parse only)
        run: python -c "import nbformat, glob, sys; [nbformat.read(open(p), as_version=4) for p in sorted(glob.glob('*.ipynb'))]; print('OK')"
